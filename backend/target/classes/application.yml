server:
  port: 8080

spring:
  application:
    name: markai-backend

  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:markai_db}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true

  # H2 Console (dev only)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:super-secret-jwt-key-for-markai-development-only-change-in-production-2024}
  expiration: 86400000  # 24 hours in milliseconds

# AI Service Configuration
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

# Logging
logging:
  level:
    com.markai: DEBUG
    org.springframework.security: INFO
